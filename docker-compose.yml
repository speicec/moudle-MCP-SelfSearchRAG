version: '3.8'

# Option 1: RAG Server only (connects to external Milvus on host)
# Use this if you already have Milvus running locally
services:
  rag-server:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MILVUS_HOST=host.docker.internal
      - MILVUS_PORT=19530
      - MILVUS_USER=khoor
      - MILVUS_PASSWORD=000000
      - MILVUS_COLLECTION=rag_chunks
      - PORT=3000
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    stdin_open: true
    tty: true

